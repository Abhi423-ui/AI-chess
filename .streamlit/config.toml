[theme]
primaryColor = "#D4AF37"
backgroundColor = "#0D0D0D"
secondaryBackgroundColor = "#161616"
textColor = "#E8E8E8"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200
port = 8501

[client]
showErrorDetails = false
toolbarMode = "minimal"

[logger]
level = "info"

[global]
developmentMode = false
